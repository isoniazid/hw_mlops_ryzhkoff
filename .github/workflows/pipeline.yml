name: ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install deps
        run: |
          echo "устанавливаю депенденси..."
          pip install -r requirements.txt || true

      - name: run pipeline
        run: |
          echo "запускаем пайплайн..."
          python ml_pipeline.py

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy step
        run: |
          echo "деплоим..."
